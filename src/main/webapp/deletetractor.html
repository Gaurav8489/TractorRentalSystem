<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Tractor</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="deletetractor.css?v=1.0">
</head>
<body>

<div class="delete-container">
    <form action="DeleteTractorServlet" method="post" class="delete-form">
        <div class="warning-icon">⚠️</div>
        <h1>Delete Tractor</h1>
        <p class="subtitle">Proceed with caution. This action cannot be undone.</p>

        <div class="input-group">
            <input type="number" name="tractorId" required placeholder=" ">
            <label>Enter Tractor ID</label>
        </div>

        <input type="submit" value="Remove Tractor from Fleet">
        
        <a href="AdminDashboardServlet" class="back-link">← Back to Dashboard</a>
    </form>
</div>

</body>
</html>
